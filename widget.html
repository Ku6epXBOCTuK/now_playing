<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>The Sonic Alchemist - Now Playing</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&amp;family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #a1faff;
        --tertiary: #64b3ff;
        --on-surface: #ffffff;
        --on-surface-variant: #adaaaa;
        --neutral-900: #333333;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: transparent;
        font-family: "Manrope", sans-serif;
        color: var(--on-surface);
        overflow: hidden;
      }

      .widget {
        width: 240px;
        height: 80px;
        background: var(--neutral-900);
        border: 1px solid rgba(73, 72, 71, 0.15);
        padding: 10px;
        border-radius: 12px;
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 10px;
        overflow: hidden;
      }

      /* Visualizer */
      .visualizer {
        display: flex;
        align-items: flex-end;
        gap: 3px;
        height: 40px;
        width: 32px;
        flex-shrink: 0;
      }

      .visualizer-bar {
        width: 3px;
        height: 40px;
        background: linear-gradient(to top, #00f4fe, #a1faff);
        border-radius: 9999px;
        transform-origin: bottom center;
        transition: transform 1s ease;
      }

      .visualizer-bar.level-1 {
        transform: scaleY(0.2);
      }
      .visualizer-bar.level-2 {
        transform: scaleY(0.3);
      }
      .visualizer-bar.level-3 {
        transform: scaleY(0.4);
      }
      .visualizer-bar.level-4 {
        transform: scaleY(0.5);
      }
      .visualizer-bar.level-5 {
        transform: scaleY(0.6);
      }
      .visualizer-bar.level-6 {
        transform: scaleY(0.7);
      }
      .visualizer-bar.level-7 {
        transform: scaleY(0.8);
      }
      .visualizer-bar.level-8 {
        transform: scaleY(0.9);
      }
      .visualizer-bar.level-9 {
        transform: scaleY(1);
      }

      /* Content section */
      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-width: 0;
      }

      .metadata {
        display: flex;
        flex-direction: column;
        line-height: 1.25;
      }

      .track-name {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        font-size: 14px;
        letter-spacing: -0.02em;
        color: var(--on-surface);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .artist-name {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 400;
        font-size: 11px;
        color: var(--on-surface-variant);
        /* text-transform: uppercase; */
        letter-spacing: 0.1em;
      }

      /* Progress section */
      .progress-section {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .progress-bar-container {
        position: relative;
        width: 100%;
        height: 2px;
        background: rgba(38, 38, 38, 0.4);
        border-radius: 9999px;
        overflow: hidden;
      }

      .progress-bar-fill {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to right, var(--primary), var(--tertiary));
        transform-origin: left center;
        transform: scaleX(0);
        animation: fillProgress var(--duration, 180s) linear forwards;
      }

      @keyframes fillProgress {
        from {
          transform: scaleX(0);
        }
        to {
          transform: scaleX(1);
        }
      }

      .time-labels {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
      }

      .time-elapsed {
        font-family: "Manrope", sans-serif;
        font-size: 10px;
        color: rgba(161, 250, 255, 0.8);
        font-weight: 500;
      }

      .time-total {
        font-family: "Manrope", sans-serif;
        font-size: 10px;
        color: var(--on-surface-variant);
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="widget">
      <!-- Left: Asymmetric Visualizer -->
      <div class="visualizer">
        <div class="visualizer-bar level-3"></div>
        <div class="visualizer-bar level-7"></div>
        <div class="visualizer-bar level-9"></div>
        <div class="visualizer-bar level-6"></div>
        <div class="visualizer-bar level-2"></div>
      </div>
      <!-- Right: Content -->
      <div class="content">
        <div class="metadata">
          <span class="track-name">now_playing.html</span>
          <span class="artist-name">Ku6epXBOCTuK</span>
        </div>
        <div class="progress-section">
          <div class="progress-bar-container">
            <div class="progress-bar-fill"></div>
          </div>
          <div class="time-labels">
            <span class="time-elapsed">0:00</span>
            <span class="time-total">3:00</span>
          </div>
        </div>
      </div>
    </div>
    <script>
      const filePath = "track_info.txt";
      let lastTrack = "";
      let elapsedSeconds = 0;

      const trackEl = document.querySelector(".track-name");
      const artistEl = document.querySelector(".artist-name");
      const elapsedEl = document.querySelector(".time-elapsed");
      const totalEl = document.querySelector(".time-total");
      const progressBar = document.querySelector(".progress-bar-fill");
      const visualizerBars = document.querySelectorAll(".visualizer-bar");

      function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return m + ":" + String(s).padStart(2, "0");
      }

      function setDuration(seconds) {
        document.documentElement.style.setProperty("--duration", seconds + "s");
        progressBar.style.animation = "none";
        progressBar.offsetHeight;
        progressBar.style.animation = "fillProgress var(--duration, 180s) linear forwards";
      }

      function updateBars() {
        visualizerBars.forEach((bar) => {
          const level = Math.floor(Math.random() * 9) + 1;
          bar.className = "visualizer-bar level-" + level;
        });
      }

      async function update() {
        elapsedSeconds++;
        elapsedEl.textContent = formatTime(elapsedSeconds);

        try {
          const response = await fetch(filePath + "?t=" + Date.now());
          const text = await response.text();
          const clean = text.trim();
          if (!clean || clean === lastTrack) return;

          lastTrack = clean;
          elapsedSeconds = 0;
          elapsedEl.textContent = "0:00";

          const [artist, title, duration] = clean.split("|");
          if (artist) artistEl.textContent = artist.trim().toUpperCase();
          if (title) trackEl.textContent = title.trim();
          if (duration) {
            totalEl.textContent = duration.trim();
            const parts = duration.trim().split(":");
            const totalSeconds = parseInt(parts[0]) * 60 + parseInt(parts[1]);
            setDuration(totalSeconds);
          }
        } catch (e) {
          console.error("Ошибка чтения файла:", e);
        }
      }

      setInterval(update, 1000);
      setInterval(updateBars, 1000);
      update();
      updateBars();
    </script>
  </body>
</html>
