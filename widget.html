<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>The Sonic Alchemist - Now Playing</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&amp;family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #a1faff;
        --primary-dim: #00f4fe;
        --primary-dim-rgb: 0, 244, 254;
        --tertiary: #64b3ff;
        --on-surface: #ffffff;
        --on-surface-variant: #adaaaa;
        --surface-variant: #262626;
        --surface-variant-rgb: 38, 38, 38;
        --outline-variant: #494847;
        --outline-variant-rgb: 73, 72, 71;
        --neutral-900: #333333;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: transparent;
        font-family: "Manrope", sans-serif;
        color: var(--on-surface);
        overflow: hidden;
      }

      .widget {
        width: 240px;
        height: 70px;
        background: var(--neutral-900);
        border: 1px solid rgba(var(--primary-dim-rgb), 0.2);
        padding: 6px;
        border-radius: 6px;
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 6px;
        overflow: hidden;
      }

      /* Visualizer */
      .visualizer {
        display: flex;
        align-items: flex-end;
        gap: 3px;
        height: 40px;
        width: 40px;
        flex-shrink: 0;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 4px;
        padding: 4px 6px;
      }

      .visualizer-bar {
        width: 3px;
        height: 32px;
        background: linear-gradient(to top, var(--primary-dim), var(--primary));
        border-radius: 9999px;
        transform-origin: bottom center;
      }

      .visualizer-bar:nth-child(1) {
        animation: dance1 0.8s ease-in-out infinite;
      }
      .visualizer-bar:nth-child(2) {
        animation: dance2 1s ease-in-out infinite;
      }
      .visualizer-bar:nth-child(3) {
        animation: dance3 1s ease-in-out infinite;
      }
      .visualizer-bar:nth-child(4) {
        animation: dance4 0.9s ease-in-out infinite;
      }
      .visualizer-bar:nth-child(5) {
        animation: dance5 0.7s ease-in-out infinite;
      }

      .visualizer-bar.paused {
        animation: none !important;
        transform-origin: center center;
        transform: scaleY(0);
      }

      .visualizer-bar:nth-child(2).paused,
      .visualizer-bar:nth-child(4).paused {
        transform: scaleY(0.4);
      }

      @keyframes dance1 {
        0% {
          transform: scaleY(0.45);
        }
        12% {
          transform: scaleY(0.55);
        }
        25% {
          transform: scaleY(0.4);
        }
        37% {
          transform: scaleY(0.6);
        }
        50% {
          transform: scaleY(0.5);
        }
        62% {
          transform: scaleY(0.55);
        }
        75% {
          transform: scaleY(0.4);
        }
        100% {
          transform: scaleY(0.45);
        }
      }

      @keyframes dance2 {
        0% {
          transform: scaleY(0.35);
        }
        15% {
          transform: scaleY(0.7);
        }
        30% {
          transform: scaleY(0.45);
        }
        45% {
          transform: scaleY(0.65);
        }
        60% {
          transform: scaleY(0.5);
        }
        75% {
          transform: scaleY(0.75);
        }
        100% {
          transform: scaleY(0.35);
        }
      }

      @keyframes dance3 {
        0% {
          transform: scaleY(0.5);
        }
        10% {
          transform: scaleY(0.9);
        }
        20% {
          transform: scaleY(0.3);
        }
        35% {
          transform: scaleY(1);
        }
        50% {
          transform: scaleY(0.2);
        }
        65% {
          transform: scaleY(0.85);
        }
        80% {
          transform: scaleY(0.4);
        }
        100% {
          transform: scaleY(0.5);
        }
      }

      @keyframes dance4 {
        0% {
          transform: scaleY(0.4);
        }
        15% {
          transform: scaleY(0.65);
        }
        30% {
          transform: scaleY(0.5);
        }
        50% {
          transform: scaleY(0.75);
        }
        65% {
          transform: scaleY(0.45);
        }
        80% {
          transform: scaleY(0.7);
        }
        100% {
          transform: scaleY(0.4);
        }
      }

      @keyframes dance5 {
        0% {
          transform: scaleY(0.4);
        }
        12% {
          transform: scaleY(0.5);
        }
        25% {
          transform: scaleY(0.6);
        }
        40% {
          transform: scaleY(0.45);
        }
        55% {
          transform: scaleY(0.55);
        }
        70% {
          transform: scaleY(0.4);
        }
        85% {
          transform: scaleY(0.6);
        }
        100% {
          transform: scaleY(0.4);
        }
      }

      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-width: 0;
      }

      .metadata {
        display: flex;
        flex-direction: column;
        line-height: 1.25;
        font-family: "Space Grotesk", sans-serif;
        overflow: hidden;
        white-space: nowrap;
        width: 100%;
      }

      .track-name {
        position: relative;
        font-weight: 700;
        font-size: 14px;
        letter-spacing: -0.02em;
        color: var(--on-surface);
      }

      .track-name-inner {
        display: inline-block;
      }

      .track-name-inner.scrolling {
        padding-left: 100%;
        animation: scroll-left var(--scroll-duration, 10s) linear infinite;
      }

      @keyframes scroll-left {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-100%);
        }
      }

      .artist-name {
        font-weight: 500;
        font-size: 11px;
        color: var(--on-surface-variant);
        letter-spacing: 0.1em;
      }

      .artist-name-inner {
        display: inline-block;
      }

      .artist-name-inner.scrolling {
        padding-left: 100%;
        animation: scroll-left var(--scroll-duration, 10s) linear infinite;
      }

      .progress-section {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .progress-bar-container {
        position: relative;
        width: 100%;
        height: 2px;
        background: rgba(var(--surface-variant-rgb), 0.4);
        border-radius: 9999px;
        overflow: hidden;
      }

      .progress-bar-fill {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to right, var(--primary), var(--tertiary));
        transform-origin: left center;
        transform: scaleX(0);
        animation: fillProgress var(--duration, 180s) linear forwards;
      }

      @keyframes fillProgress {
        from {
          transform: scaleX(0);
        }
        to {
          transform: scaleX(1);
        }
      }

      .time-labels {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        font-size: 10px;
        font-weight: 500;
      }

      .time-elapsed {
        color: color-mix(in srgb, var(--primary) 80%, transparent);
      }

      .time-total {
        color: var(--on-surface-variant);
      }
    </style>
  </head>
  <body>
    <div class="widget">
      <!-- Left: Asymmetric Visualizer -->
      <div class="visualizer">
        <div class="visualizer-bar paused"></div>
        <div class="visualizer-bar paused"></div>
        <div class="visualizer-bar paused"></div>
        <div class="visualizer-bar paused"></div>
        <div class="visualizer-bar paused"></div>
      </div>
      <!-- Right: Content -->
      <div class="content">
        <div class="metadata">
          <div class="track-name">
            <div class="track-name-inner"></div>
          </div>
          <div class="artist-name">
            <div class="artist-name-inner"></div>
          </div>
        </div>
        <div class="progress-section">
          <div class="progress-bar-container">
            <div class="progress-bar-fill"></div>
          </div>
          <div class="time-labels">
            <span class="time-elapsed">--:--</span>
            <span class="time-total">--:--</span>
          </div>
        </div>
      </div>
    </div>
    <script>
      const filePath = "track_info.txt";
      let lastTrack = "";
      let elapsedSeconds = 0;

      const trackContainer = document.querySelector(".track-name");
      const trackEl = document.querySelector(".track-name-inner");
      const artistContainer = document.querySelector(".artist-name");
      const artistEl = document.querySelector(".artist-name-inner");
      const elapsedEl = document.querySelector(".time-elapsed");
      const totalEl = document.querySelector(".time-total");
      const progressBar = document.querySelector(".progress-bar-fill");
      const visualizerBars = document.querySelectorAll(".visualizer-bar");

      const SCROLL_SPEED = 20;

      function updateTrackScroll() {
        trackEl.classList.remove("scrolling");
        const textWidth = trackEl.scrollWidth;
        const containerWidth = trackContainer.clientWidth;
        if (textWidth > containerWidth) {
          const duration = textWidth / SCROLL_SPEED;
          trackEl.style.setProperty("--scroll-duration", duration + "s");
          trackEl.classList.add("scrolling");
        }
      }

      function updateArtistScroll() {
        artistEl.classList.remove("scrolling");
        const textWidth = artistEl.scrollWidth;
        const containerWidth = artistContainer.clientWidth;
        if (textWidth > containerWidth) {
          const duration = textWidth / SCROLL_SPEED;
          artistEl.style.setProperty("--scroll-duration", duration + "s");
          artistEl.classList.add("scrolling");
        }
      }

      function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return m + ":" + String(s).padStart(2, "0");
      }

      function setDuration(seconds) {
        document.documentElement.style.setProperty("--duration", seconds + "s");
        progressBar.style.animation = "none";
        progressBar.offsetHeight;
        progressBar.style.animation = "fillProgress var(--duration, 180s) linear forwards";
      }

      let isPaused = false;

      function showPaused() {
        if (isPaused) return;
        isPaused = true;
        lastTrack = "";
        artistEl.textContent = "Ku6epXBOCTuK";
        updateArtistScroll();
        trackEl.textContent = "github.com/Ku6epXBOCTuK/now_playing";
        updateTrackScroll();
        totalEl.textContent = "--:--";
        elapsedEl.textContent = "--:--";
        progressBar.style.animation = "none";
        progressBar.offsetHeight;
        progressBar.style.animation = "";
        progressBar.style.animationPlayState = "paused";
        visualizerBars.forEach((bar) => bar.classList.add("paused"));
      }

      function showPlaying() {
        if (!isPaused) return;
        isPaused = false;
        progressBar.style.animationPlayState = "running";
        visualizerBars.forEach((bar) => bar.classList.remove("paused"));
      }

      async function update() {
        if (!isPaused) {
          elapsedSeconds++;
          elapsedEl.textContent = formatTime(elapsedSeconds);
        }

        try {
          const response = await fetch(filePath + "?t=" + Date.now());
          const text = await response.text();
          const clean = text.replace(/^\uFEFF/, "").trim();

          if (!clean) {
            showPaused();
            return;
          }

          if (clean === lastTrack) return;

          const [artist, title, duration] = clean.split("|");
          const hasData = artist?.trim() || title?.trim() || duration?.trim();

          if (!hasData) {
            showPaused();
            return;
          }

          showPlaying();
          lastTrack = clean;
          elapsedSeconds = 0;
          elapsedEl.textContent = "0:00";

          artistEl.textContent = artist ? artist.trim() : "";
          updateArtistScroll();

          const titleText = title ? title.trim() : "";
          trackEl.textContent = titleText;
          updateTrackScroll();

          if (duration && duration.trim()) {
            totalEl.textContent = duration.trim();
            const parts = duration.trim().split(":");
            const totalSeconds = parseInt(parts[0]) * 60 + parseInt(parts[1]);
            setDuration(totalSeconds);
          } else {
            totalEl.textContent = "--:--";
          }
        } catch (e) {
          console.error("Ошибка чтения файла:", e);
          showPaused();
        }
      }

      update();
      setInterval(update, 1000);
    </script>
  </body>
</html>
