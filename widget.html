<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>The Sonic Alchemist - Now Playing</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&amp;family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #a1faff;
        --tertiary: #64b3ff;
        --on-surface: #ffffff;
        --on-surface-variant: #adaaaa;
        --neutral-900: #333333;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: transparent;
        font-family: "Manrope", sans-serif;
        color: var(--on-surface);
        overflow: hidden;
      }

      .widget {
        width: 240px;
        height: 80px;
        background: var(--neutral-900);
        border: 1px solid rgba(73, 72, 71, 0.15);
        padding: 10px;
        border-radius: 12px;
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 10px;
        overflow: hidden;
      }

      /* Visualizer */
      .visualizer {
        display: flex;
        align-items: flex-end;
        gap: 3px;
        height: 40px;
        width: 32px;
        flex-shrink: 0;
      }

      .visualizer-bar {
        width: 3px;
        height: 40px;
        background: linear-gradient(to top, #00f4fe, #a1faff);
        border-radius: 9999px;
        transform-origin: bottom center;
      }

      .visualizer-bar:nth-child(1) { animation: dance1 0.8s ease-in-out infinite; }
      .visualizer-bar:nth-child(2) { animation: dance2 1.0s ease-in-out infinite; }
      .visualizer-bar:nth-child(3) { animation: dance3 1.0s ease-in-out infinite; }
      .visualizer-bar:nth-child(4) { animation: dance4 0.9s ease-in-out infinite; }
      .visualizer-bar:nth-child(5) { animation: dance5 0.7s ease-in-out infinite; }

      .visualizer-bar.paused {
        animation: none !important;
        transform: scaleY(0);
      }

      @keyframes dance1 {
        0%   { transform: scaleY(0.45); }
        12%  { transform: scaleY(0.55); }
        25%  { transform: scaleY(0.4); }
        37%  { transform: scaleY(0.6); }
        50%  { transform: scaleY(0.5); }
        62%  { transform: scaleY(0.55); }
        75%  { transform: scaleY(0.4); }
        100% { transform: scaleY(0.45); }
      }

      @keyframes dance2 {
        0%   { transform: scaleY(0.35); }
        15%  { transform: scaleY(0.7); }
        30%  { transform: scaleY(0.45); }
        45%  { transform: scaleY(0.65); }
        60%  { transform: scaleY(0.5); }
        75%  { transform: scaleY(0.75); }
        100% { transform: scaleY(0.35); }
      }

      @keyframes dance3 {
        0%   { transform: scaleY(0.5); }
        10%  { transform: scaleY(0.9); }
        20%  { transform: scaleY(0.3); }
        35%  { transform: scaleY(1); }
        50%  { transform: scaleY(0.2); }
        65%  { transform: scaleY(0.85); }
        80%  { transform: scaleY(0.4); }
        100% { transform: scaleY(0.5); }
      }

      @keyframes dance4 {
        0%   { transform: scaleY(0.4); }
        15%  { transform: scaleY(0.65); }
        30%  { transform: scaleY(0.5); }
        50%  { transform: scaleY(0.75); }
        65%  { transform: scaleY(0.45); }
        80%  { transform: scaleY(0.7); }
        100% { transform: scaleY(0.4); }
      }

      @keyframes dance5 {
        0%   { transform: scaleY(0.4); }
        12%  { transform: scaleY(0.5); }
        25%  { transform: scaleY(0.6); }
        40%  { transform: scaleY(0.45); }
        55%  { transform: scaleY(0.55); }
        70%  { transform: scaleY(0.4); }
        85%  { transform: scaleY(0.6); }
        100% { transform: scaleY(0.4); }
      }

      /* Content section */
      .content {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-width: 0;
      }

      .metadata {
        display: flex;
        flex-direction: column;
        line-height: 1.25;
      }

      .track-name {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        font-size: 14px;
        letter-spacing: -0.02em;
        color: var(--on-surface);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .artist-name {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 400;
        font-size: 11px;
        color: var(--on-surface-variant);
        /* text-transform: uppercase; */
        letter-spacing: 0.1em;
      }

      /* Progress section */
      .progress-section {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .progress-bar-container {
        position: relative;
        width: 100%;
        height: 2px;
        background: rgba(38, 38, 38, 0.4);
        border-radius: 9999px;
        overflow: hidden;
      }

      .progress-bar-fill {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to right, var(--primary), var(--tertiary));
        transform-origin: left center;
        transform: scaleX(0);
        animation: fillProgress var(--duration, 180s) linear forwards;
      }

      @keyframes fillProgress {
        from {
          transform: scaleX(0);
        }
        to {
          transform: scaleX(1);
        }
      }

      .time-labels {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
      }

      .time-elapsed {
        font-family: "Manrope", sans-serif;
        font-size: 10px;
        color: rgba(161, 250, 255, 0.8);
        font-weight: 500;
      }

      .time-total {
        font-family: "Manrope", sans-serif;
        font-size: 10px;
        color: var(--on-surface-variant);
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <div class="widget">
      <!-- Left: Asymmetric Visualizer -->
      <div class="visualizer">
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
        <div class="visualizer-bar"></div>
      </div>
      <!-- Right: Content -->
      <div class="content">
        <div class="metadata">
          <span class="track-name">now_playing.html</span>
          <span class="artist-name">Ku6epXBOCTuK</span>
        </div>
        <div class="progress-section">
          <div class="progress-bar-container">
            <div class="progress-bar-fill"></div>
          </div>
          <div class="time-labels">
            <span class="time-elapsed">0:00</span>
            <span class="time-total">3:00</span>
          </div>
        </div>
      </div>
    </div>
    <script>
      const filePath = "track_info.txt";
      let lastTrack = "";
      let elapsedSeconds = 0;

      const trackEl = document.querySelector(".track-name");
      const artistEl = document.querySelector(".artist-name");
      const elapsedEl = document.querySelector(".time-elapsed");
      const totalEl = document.querySelector(".time-total");
      const progressBar = document.querySelector(".progress-bar-fill");
      const visualizerBars = document.querySelectorAll(".visualizer-bar");

      function formatTime(seconds) {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return m + ":" + String(s).padStart(2, "0");
      }

      function setDuration(seconds) {
        document.documentElement.style.setProperty("--duration", seconds + "s");
        progressBar.style.animation = "none";
        progressBar.offsetHeight;
        progressBar.style.animation = "fillProgress var(--duration, 180s) linear forwards";
      }

      let isPaused = true;

      function showPaused() {
        if (isPaused) return;
        isPaused = true;
        lastTrack = "";
        artistEl.textContent = "Ku6epXBOCTuK";
        trackEl.textContent = "github.com/Ku6epXBOCTuK";
        totalEl.textContent = "";
        elapsedEl.textContent = "";
        progressBar.style.animationPlayState = "paused";
        visualizerBars.forEach((bar, i) => {
          if (i === 1 || i === 3) {
            bar.classList.add("paused");
            bar.style.transformOrigin = "center center";
            bar.style.transform = "scaleY(0.4)";
          } else {
            bar.classList.add("paused");
          }
        });
      }

      function showPlaying() {
        if (!isPaused) return;
        isPaused = false;
        progressBar.style.animationPlayState = "running";
        visualizerBars.forEach((bar) => {
          bar.classList.remove("paused");
          bar.style.transformOrigin = "";
          bar.style.transform = "";
        });
      }

      async function update() {
        if (!isPaused) {
          elapsedSeconds++;
          elapsedEl.textContent = formatTime(elapsedSeconds);
        }

        try {
          const response = await fetch(filePath + "?t=" + Date.now());
          const text = await response.text();
          const clean = text.replace(/^\uFEFF/, "").trim();

          if (!clean) {
            showPaused();
            return;
          }

          if (clean === lastTrack) return;

          showPlaying();
          lastTrack = clean;
          elapsedSeconds = 0;
          elapsedEl.textContent = "0:00";

          const [artist, title, duration] = clean.split("|");
          if (artist) artistEl.textContent = artist.trim().toUpperCase();
          if (title) trackEl.textContent = title.trim();
          if (duration) {
            totalEl.textContent = duration.trim();
            const parts = duration.trim().split(":");
            const totalSeconds = parseInt(parts[0]) * 60 + parseInt(parts[1]);
            setDuration(totalSeconds);
          }
        } catch (e) {
          console.error("Ошибка чтения файла:", e);
        }
      }

      setInterval(update, 1000);
      showPaused();
      update();
    </script>
  </body>
</html>
